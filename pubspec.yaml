name: otel_redis
description: >-
  OpenTelemetry instrumentation for package:redis. Wraps Redis commands in CLIENT-kind spans following OTel stable semantic conventions (db.system.name=redis, db.operation.name, server.address).
version: 0.1.0-beta.2-wip
repository: https://github.com/dartastic/otel_redis
homepage: https://dartastic.io

environment:
  sdk: ^3.0.0

dependencies:
  dartastic_opentelemetry: ^1.1.0-beta.5
  dartastic_opentelemetry_api: ^1.0.0-beta.6
  redis: ^4.1.0

dev_dependencies:
  dart_flutter_team_lints: ^3.5.2
  pub_semver: ^2.0.0
  pubspec_parse: ^1.5.0
  test: ^1.26.3
